<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Call - Alex Ecom</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0a0e1a;
            --text-color: #ffffff;
            --accent-color: #e8600a;
            --accent-hover: #c95008;
            --modal-bg: #111827;
            --card-bg: #141929;
            --border-color: #2a3050;
            --font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            overflow-x: hidden;
            width: 100%;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 0;
            position: relative;
        }

        /* Animated Mesh Background */
        .mesh-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: var(--bg-color);
        }

        .blob {
            position: absolute;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(232, 96, 10, 0.15) 0%, rgba(232, 96, 10, 0) 70%);
            filter: blur(80px);
            border-radius: 50%;
            pointer-events: none;
            animation: move 20s infinite alternate cubic-bezier(0.45, 0, 0.55, 1);
        }

        .blob-1 {
            top: -10%;
            left: -10%;
            background: radial-gradient(circle, rgba(232, 96, 10, 0.2) 0%, rgba(232, 96, 10, 0) 70%);
            animation-duration: 25s;
        }

        .blob-2 {
            bottom: -10%;
            right: -10%;
            background: radial-gradient(circle, rgba(201, 80, 8, 0.15) 0%, rgba(201, 80, 8, 0) 70%);
            animation-duration: 30s;
            animation-delay: -5s;
        }

        @keyframes move {
            0% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(10vw, 5vh) scale(1.1);
            }

            66% {
                transform: translate(-5vw, 10vh) scale(0.9);
            }

            100% {
                transform: translate(0, 0) scale(1);
            }
        }

        .booking-section {
            width: 100%;
            max-width: 1200px;
            padding: clamp(3rem, 10vh, 6rem) 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            flex-grow: 1;
            z-index: 1;
            position: relative;
        }

        .headline {
            font-weight: 800;
            font-size: clamp(2rem, 5vw, 3.2rem);
            line-height: 1.15;
            text-align: center;
            max-width: 1200px;
            margin-bottom: 2rem;
            letter-spacing: -1px;
        }

        .headline .red-text {
            color: var(--accent-color);
            text-decoration: underline;
            text-decoration-color: var(--accent-color);
            text-underline-offset: 6px;
            text-decoration-thickness: 4px;
        }

        .calendly-container {
            width: 100%;
            max-width: 1200px;
            min-height: 700px;
            margin: 0 auto;
            border-radius: 12px;
            overflow: hidden;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        footer {
            padding: 60px 20px;
            text-align: center;
            color: #4b5563;
            font-size: 13px;
            border-top: 1px solid var(--border-color);
            width: 100%;
            margin-top: auto;
        }
    </style>
</head>

<body>

    <div class="mesh-background">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <section class="booking-section">
        <h1 class="headline">
            <span class="red-text">Book Your Call</span>
        </h1>

        <div class="calendly-container">
            <!-- Calendly inline widget begin -->
            <div class="calendly-inline-widget"
                data-url="https://calendly.com/eli-alexecomsales/30min?hide_gdpr_banner=1&background_color=141929&text_color=ffffff&primary_color=e8600a"
                style="min-width:320px;height:700px;"></div>
            <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
            <!-- Calendly inline widget end -->
        </div>
    </section>

    <footer>
        <p>© 2026 Alex Ecom. All Rights Reserved.</p>
    </footer>

</body>

</html>
